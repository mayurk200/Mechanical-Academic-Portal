<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — Mechanical Academic Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div class="auth-wrapper">
    <div class="card auth-card" style="max-width:460px;">
      <div class="card-body p-4">
        <div class="text-center mb-4">
          <img src="assets/img/logo.png" alt="ADCET" style="height:50px;object-fit:contain;">
          <h4 class="fw-bold mt-2">Create Account</h4>
          <p class="text-muted small">Join Mechanical Academic Portal and start learning</p>
        </div>

        <form id="register-form">
          <div class="mb-3">
            <label for="name" class="form-label">Full Name</label>
            <input type="text" id="name" class="form-control" placeholder="John Doe" required>
          </div>
          <div class="mb-3">
            <label for="email" class="form-label">Email Address</label>
            <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
          </div>
          <div class="row mb-3">
            <div class="col">
              <label for="urn" class="form-label">URN <small class="text-muted">(optional)</small></label>
              <input type="text" id="urn" class="form-control" placeholder="URN-12345">
            </div>
            <div class="col">
              <label for="rollNo" class="form-label">Roll No <small class="text-muted">(optional)</small></label>
              <input type="text" id="rollNo" class="form-control" placeholder="CS-001">
            </div>
          </div>
          <div class="mb-3">
            <label for="role" class="form-label">Register As</label>
            <select id="role" class="form-select" required>
              <option value="student">Student</option>
              <option value="teacher">Teacher</option>
            </select>
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" id="password" class="form-control" placeholder="Min 6 characters" required minlength="6">
          </div>
          <div class="mb-3">
            <label for="confirm-password" class="form-label">Confirm Password</label>
            <input type="password" id="confirm-password" class="form-control" placeholder="Re-enter password" required>
          </div>
          <button type="submit" class="btn btn-primary w-100" id="register-btn">
            <i class="bi bi-person-plus me-2"></i>Create Account
          </button>
        </form>

        <hr>
        <p class="text-center mb-0 small">Already have an account? <a href="login.html">Sign In</a></p>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container-custom"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import { registerUser, guardPublicPage } from './assets/js/core/auth.js';
    import { showToast } from './assets/js/core/utils.js';

    guardPublicPage();

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm-password').value;
      if (password !== confirm) { showToast('Passwords do not match', 'error'); return; }

      const btn = document.getElementById('register-btn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Creating...';

      const role = document.getElementById('role').value;
      try {
        await registerUser({
          email: document.getElementById('email').value.trim(),
          password,
          name: document.getElementById('name').value.trim(),
          role,
          urn: document.getElementById('urn').value.trim(),
          rollNo: document.getElementById('rollNo').value.trim()
        });
        showToast('Account created!', 'success');
        const map = { admin: 'app/admin-dashboard.html', teacher: 'app/teacher-dashboard.html', student: 'app/student-dashboard.html' };
        setTimeout(() => { window.location.href = map[role] || map.student; }, 800);
      } catch (err) {
        showToast(err.message || 'Registration failed', 'error');
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-person-plus me-2"></i>Create Account';
      }
    });
  </script>
</body>
</html>
