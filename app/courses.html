<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Courses — Mechanical Academic Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body>
  <aside class="sidebar" id="sidebar"></aside>

  <div class="main-content">
    <div class="top-bar">
      <button class="btn btn-light btn-sm menu-toggle" id="menu-toggle"><i class="bi bi-list"></i></button>
      <h4><i class="bi bi-book me-2"></i>Courses</h4>
      <div id="create-btn-wrap"></div>
    </div>

    <div class="page-body">
      <div class="row mb-3">
        <div class="col-md-4">
          <input type="text" id="course-search" class="form-control" placeholder="🔍 Search courses...">
        </div>
      </div>

      <div class="row g-3" id="courses-grid">
        <div class="col-12 text-center text-muted py-5"><span class="spinner-border"></span></div>
      </div>
    </div>
  </div>

  <!-- Create Course Modal -->
  <div class="modal fade" id="create-course-modal">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title"><i class="bi bi-plus-circle me-2"></i>Create Course</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <form id="create-course-form">
          <div class="modal-body">
            <div class="mb-3">
              <label class="form-label">Course Title</label>
              <input type="text" id="course-title" class="form-control" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Course Code</label>
              <input type="text" id="course-code" class="form-control" placeholder="e.g. CS101">
            </div>
            <div class="mb-3">
              <label class="form-label">Description</label>
              <textarea id="course-desc" class="form-control" rows="3"></textarea>
            </div>
            <!-- Admin only: Assign Teacher -->
            <div id="admin-teacher-select-wrap" class="mb-3 d-none">
              <label class="form-label form-label-sm text-primary fw-bold"><i class="bi bi-person-badge me-1"></i>Assign
                Teacher</label>
              <select id="course-teacher" class="form-select border-primary-subtle bg-light">
                <option value="">Loading teachers...</option>
              </select>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-primary"><i class="bi bi-plus-circle me-1"></i>Create</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Secure Delete Modal -->
  <div class="modal fade" id="secureDeleteModal" tabindex="-1" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered border-danger">
      <div class="modal-content">
        <div class="modal-header bg-danger text-white">
          <h5 class="modal-title"><i class="bi bi-exclamation-triangle-fill me-2"></i>Secure Delete</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body text-center py-4 text-start">
          <p class="text-danger fw-bold my-2" id="secure-delete-msg">Are you sure you want to delete this course?</p>
          <div class="mt-4 text-start">
            <label class="form-label fw-bold">Confirm Account Password:</label>
            <input type="password" id="secure-delete-password" class="form-control"
              placeholder="Enter password to authorize">
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-danger" id="confirm-secure-delete-btn" disabled>
            <i class="bi bi-trash"></i> Permanently Delete
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import { initApp } from '../assets/js/core/router.js';
    import { CourseService, EnrollmentService, UserService } from '../services/database.js';
    import { verifyCurrentPassword } from '../assets/js/core/auth.js';
    import { showToast, escapeHtml, closeModal } from '../assets/js/core/utils.js';

    try {
      const userData = await initApp();
      let allCourses = [];

      // Show create button for teacher/admin
      if (userData.role !== 'student') {
        document.getElementById('create-btn-wrap').innerHTML = '<button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#create-course-modal"><i class="bi bi-plus-circle me-1"></i>Create Course</button>';

        // If Admin, populate and show the teacher assignment dropdown
        if (userData.role === 'admin') {
          document.getElementById('admin-teacher-select-wrap').classList.remove('d-none');
          UserService.getAll().then(users => {
            const teachers = users.filter(u => u.role === 'teacher' || u.role === 'admin');
            const select = document.getElementById('course-teacher');
            select.innerHTML = teachers.map(t => `<option value="${t.uid}" data-name="${t.name}">${t.name} (${t.email})</option>`).join('');
          }).catch(e => console.error("Could not load teachers", e));
        }
      }

      async function loadCourses() {
        if (userData.role === 'student') {
          allCourses = await EnrollmentService.getEnrolledCourses(userData.uid);
        } else if (userData.role === 'teacher') {
          allCourses = await CourseService.getByTeacher(userData.uid);
        } else {
          allCourses = await CourseService.getAll();
        }
        renderCourses(allCourses);
      }

      async function renderCourses(courses) {
        const grid = document.getElementById('courses-grid');
        if (courses.length === 0) {
          grid.innerHTML = `<div class="col-12 text-center text-muted py-5">
            <i class="bi bi-book display-4 d-block mb-2"></i>
            <p>${userData.role === 'student' ? 'No courses assigned yet. Your teacher will assign courses.' : 'No courses found. Create your first course.'}</p>
          </div>`;
          return;
        }

        const enriched = await Promise.all(courses.map(async c => {
          const count = await EnrollmentService.countByCourse(c.id);
          return { ...c, studentCount: count };
        }));

        grid.innerHTML = enriched.map(c => `
          <div class="col-md-4 col-sm-6">
            <div class="card course-card h-100 shadow-sm">
              <div class="card-body">
                <span class="badge bg-secondary course-code mb-2">${c.code || '—'}</span>
                <h6 class="card-title">${escapeHtml(c.title)}</h6>
                <p class="card-text small text-muted mb-2">${escapeHtml(c.description || 'No description')}</p>
                <div class="d-flex justify-content-between align-items-center">
                  <small class="text-muted"><i class="bi bi-people me-1"></i>${c.studentCount} students</small>
                  <div class="d-flex gap-1">
                    <a href="course-detail.html?id=${c.id}" class="btn btn-primary btn-sm"><i class="bi bi-eye me-1"></i>View</a>
                    ${(userData.role !== 'student') ? `<button class="btn btn-outline-danger btn-sm delete-btn" data-id="${c.id}"><i class="bi bi-trash"></i></button>` : ''}
                  </div>
                </div>
              </div>
            </div>
          </div>`).join('');

        // ── Secure Delete Logic ──
        let activeDeleteId = null;
        grid.querySelectorAll('.delete-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            activeDeleteId = btn.dataset.id;
            document.getElementById('secure-delete-msg').textContent = 'Delete this course? This will also remove all enrollments, attendance, tests, and results. This cannot be undone.';
            document.getElementById('secure-delete-password').value = '';
            document.getElementById('confirm-secure-delete-btn').disabled = true;
            new bootstrap.Modal(document.getElementById('secureDeleteModal')).show();
          });
        });

        const passInput = document.getElementById('secure-delete-password');
        const confirmBtn = document.getElementById('confirm-secure-delete-btn');
        if (passInput && confirmBtn) {
          // Prevent multiple listeners if renderCourses runs again
          const newPassInput = passInput.cloneNode(true);
          const newConfirmBtn = confirmBtn.cloneNode(true);
          passInput.parentNode.replaceChild(newPassInput, passInput);
          confirmBtn.parentNode.replaceChild(newConfirmBtn, confirmBtn);

          newPassInput.addEventListener('input', (e) => {
            newConfirmBtn.disabled = (e.target.value.length < 6);
          });

          newConfirmBtn.addEventListener('click', async (e) => {
            const pass = newPassInput.value;
            const btn = e.target;
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>Verifying...';

            try {
              await verifyCurrentPassword(pass);
              await CourseService.cascadeDelete(activeDeleteId);
              closeModal('secureDeleteModal');
              showToast('Course and related data deleted', 'success');
              loadCourses();
            } catch (err) {
              showToast(err.message || 'Incorrect Password', 'error');
              btn.disabled = false;
              btn.innerHTML = '<i class="bi bi-trash"></i> Permanently Delete';
            }
          });
        }
      }

      // Search
      document.getElementById('course-search').addEventListener('input', (e) => {
        const q = e.target.value.toLowerCase();
        renderCourses(allCourses.filter(c => c.title.toLowerCase().includes(q) || (c.code || '').toLowerCase().includes(q)));
      });

      // Create form
      document.getElementById('create-course-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        try {

          let assignedUid = userData.uid;
          let assignedName = userData.name;

          // If Admin is creating, pull from the dropdown
          if (userData.role === 'admin') {
            const select = document.getElementById('course-teacher');
            if (select.value) {
              assignedUid = select.value;
              assignedName = select.options[select.selectedIndex].dataset.name;
            }
          }

          await CourseService.create({
            title: document.getElementById('course-title').value.trim(),
            description: document.getElementById('course-desc').value.trim(),
            code: document.getElementById('course-code').value.trim(),
            teacherId: assignedUid,
            teacherName: assignedName
          });
          showToast('Course created and assigned successfully!', 'success');
          closeModal('create-course-modal');
          e.target.reset();
          loadCourses();
        } catch (err) { showToast(err.message, 'error'); }
      });

      loadCourses();
    } catch (e) { console.error(e); }
  </script>
</body>

</html>
