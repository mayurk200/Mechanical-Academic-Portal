<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Management — Mechanical Academic Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/components.css">
</head>
<body>
  <aside class="sidebar" id="sidebar"></aside>

  <div class="main-content">
    <div class="top-bar">
      <button class="btn btn-light btn-sm menu-toggle" id="menu-toggle"><i class="bi bi-list"></i></button>
      <h4><i class="bi bi-person-gear me-2"></i>User Management</h4>
      <div></div>
    </div>

    <div class="page-body">
      <!-- Header Actions -->
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
          <h5 class="mb-0">System Users</h5>
          <p class="text-muted small mb-0">Manage teachers, admins, and students globally.</p>
        </div>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addUserModal">
          <i class="bi bi-person-plus me-1"></i> Add Teacher / Admin
        </button>
      </div>

      <!-- Filters -->
      <div class="card shadow-sm mb-4 bg-white border-0">
        <div class="card-body p-3 d-flex gap-3 align-items-center flex-wrap">
          <div class="input-group" style="max-width:300px;">
            <span class="input-group-text bg-white text-muted border-end-0"><i class="bi bi-search"></i></span>
            <input type="text" id="search-input" class="form-control border-start-0 ps-0" placeholder="Search by name, email, URN...">
          </div>
          <select id="role-filter" class="form-select form-select-sm" style="width:150px;">
            <option value="all">All Roles</option>
            <option value="teacher">Teachers</option>
            <option value="student">Students</option>
            <option value="admin">Admins</option>
          </select>
          <div class="ms-auto small text-muted">
            Total Users: <span id="total-users-count" class="fw-bold text-dark">0</span>
          </div>
        </div>
      </div>

      <!-- Users Table -->
      <div class="card shadow-sm">
        <div class="card-body p-0 table-responsive" style="min-height:400px;">
          <table class="table table-hover align-middle mb-0">
            <thead class="table-light">
              <tr>
                <th style="padding-left:1.5rem;">User</th>
                <th>Role</th>
                <th>Details</th>
                <th>Registered</th>
                <th class="text-end" style="padding-right:1.5rem;">Actions</th>
              </tr>
            </thead>
            <tbody id="users-tbody">
              <tr><td colspan="5" class="text-center py-5 text-muted"><div class="spinner-border spinner-border-sm me-2"></div> Loading users...</td></tr>
            </tbody>
          </table>
        </div>
        <!-- Pagination -->
        <div class="card-footer bg-white d-flex justify-content-between align-items-center py-3">
          <button class="btn btn-sm btn-outline-secondary" id="btn-prev" disabled><i class="bi bi-chevron-left"></i> Prev</button>
          <span class="small text-muted" id="page-info">Page 1 of 1</span>
          <button class="btn btn-sm btn-outline-secondary" id="btn-next" disabled>Next <i class="bi bi-chevron-right"></i></button>
        </div>
      </div>
    </div>
  </div>

  <!-- Add User Modal -->
  <div class="modal fade" id="addUserModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content border-0 shadow">
        <div class="modal-header border-bottom-0 pb-0">
          <h5 class="modal-title"><i class="bi bi-person-plus text-primary me-2"></i>Register Staff</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="addUserForm">
            <div class="mb-3">
              <label class="form-label form-label-sm">Full Name</label>
              <input type="text" id="add-name" class="form-control" required placeholder="e.g. Dr. John Doe">
            </div>
            <div class="mb-3">
              <label class="form-label form-label-sm">Email Address</label>
              <input type="email" id="add-email" class="form-control" required placeholder="name@college.edu">
            </div>
            <div class="mb-3">
              <label class="form-label form-label-sm">Initial Password</label>
              <input type="text" id="add-password" class="form-control" required minlength="6" placeholder="Assign a default password">
            </div>
            <div class="mb-4">
              <label class="form-label form-label-sm">System Role</label>
              <select id="add-role" class="form-select">
                <option value="teacher">Teacher (Course Coordinator)</option>
                <option value="admin">Admin (Full Access)</option>
              </select>
            </div>
            <button type="submit" class="btn btn-primary w-100" id="btn-save-user">Create User Account</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container-custom"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="../assets/js/modules/admin-users.js"></script>
</body>
</html>
