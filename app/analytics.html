<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics — Mechanical Academic Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/modules.css">
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>

<body>
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <div class="top-bar">
      <button class="btn btn-light btn-sm menu-toggle" id="menu-toggle"><i class="bi bi-list"></i></button>
      <h4><i class="bi bi-bar-chart me-2"></i>Analytics</h4>
      <button class="btn btn-outline-primary btn-sm" id="btn-download-report">
        <i class="bi bi-download me-1"></i> Download Report
      </button>
    </div>
    <div class="page-body">
      <!-- Stats -->
      <div class="row g-3 mb-4">
        <div class="col-md-3 col-6">
          <div class="card stat-card shadow-sm">
            <div class="card-body">
              <div class="stat-icon blue"><i class="bi bi-people"></i></div>
              <div class="stat-value" id="a-users">—</div>
              <div class="stat-label">Total Users</div>
            </div>
          </div>
        </div>
        <div class="col-md-3 col-6">
          <div class="card stat-card shadow-sm">
            <div class="card-body">
              <div class="stat-icon purple"><i class="bi bi-book"></i></div>
              <div class="stat-value" id="a-courses">—</div>
              <div class="stat-label">Courses</div>
            </div>
          </div>
        </div>
        <div class="col-md-3 col-6">
          <div class="card stat-card shadow-sm">
            <div class="card-body">
              <div class="stat-icon green"><i class="bi bi-pencil-square"></i></div>
              <div class="stat-value" id="a-tests">—</div>
              <div class="stat-label">Tests</div>
            </div>
          </div>
        </div>
        <div class="col-md-3 col-6">
          <div class="card stat-card shadow-sm">
            <div class="card-body">
              <div class="stat-icon orange"><i class="bi bi-check-circle"></i></div>
              <div class="stat-value" id="a-results">—</div>
              <div class="stat-label">Test Submissions</div>
            </div>
          </div>
        </div>
      </div>

      <div class="row g-4">
        <!-- Course Popularity -->
        <div class="col-lg-6">
          <div class="card shadow-sm">
            <div class="card-header bg-white">
              <h6 class="mb-0"><i class="bi bi-book me-2"></i>Course Popularity</h6>
            </div>
            <div class="card-body" id="course-popularity"></div>
          </div>
        </div>
        <!-- Test Performance -->
        <div class="col-lg-6">
          <div class="card shadow-sm">
            <div class="card-header bg-white">
              <h6 class="mb-0"><i class="bi bi-graph-up me-2"></i>Test Performance</h6>
            </div>
            <div class="card-body" id="test-performance"></div>
          </div>
        </div>
        <!-- Role Distribution -->
        <div class="col-lg-6">
          <div class="card shadow-sm">
            <div class="card-header bg-white">
              <h6 class="mb-0"><i class="bi bi-people me-2"></i>User Distribution</h6>
            </div>
            <div class="card-body" id="role-distribution"></div>
          </div>
        </div>
        <!-- Recent Activity -->
        <div class="col-lg-6">
          <div class="card shadow-sm">
            <div class="card-header bg-white">
              <h6 class="mb-0"><i class="bi bi-clock-history me-2"></i>Recent Activity</h6>
            </div>
            <div class="card-body" id="recent-activity"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import { initApp } from '../assets/js/core/router.js';
    import { db } from '../config/firebase-config.js';
    import { collection, getDocs, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { EnrollmentService, ActivityLogService } from '../services/database.js';
    import { timeAgo, escapeHtml, LMSLogger, showToast, friendlyError } from '../assets/js/core/utils.js';

    try {
      await initApp(['admin']);

      const [users, courses, tests, results] = await Promise.all([
        getDocs(collection(db, 'users')),
        getDocs(collection(db, 'courses')),
        getDocs(collection(db, 'tests')),
        getDocs(collection(db, 'test_results'))
      ]);

      document.getElementById('a-users').textContent = users.size;
      document.getElementById('a-courses').textContent = courses.size;
      document.getElementById('a-tests').textContent = tests.size;
      document.getElementById('a-results').textContent = results.size;

      // Course Popularity
      const coursesList = courses.docs.map(d => ({ id: d.id, ...d.data() }));
      const popContainer = document.getElementById('course-popularity');
      if (coursesList.length === 0) {
        popContainer.innerHTML = '<p class="text-muted">No courses yet</p>';
      } else {
        const popularity = await Promise.all(coursesList.map(async c => {
          const count = await EnrollmentService.countByCourse(c.id);
          return { title: c.title, count };
        }));
        popularity.sort((a, b) => b.count - a.count);
        const max = Math.max(...popularity.map(c => c.count), 1);
        popContainer.innerHTML = popularity.slice(0, 8).map(c => `
          <div class="mb-3">
            <div class="d-flex justify-content-between mb-1">
              <span class="small fw-semibold text-truncate" style="max-width: 250px;">${escapeHtml(c.title)}</span>
              <span class="small text-muted">${c.count} students</span>
            </div>
            <div class="progress" style="height:8px;">
              <div class="progress-bar" style="width:${(c.count / max * 100)}%"></div>
            </div>
          </div>`).join('');
      }

      // Test Performance
      const resultsList = results.docs.map(d => d.data());
      const perfContainer = document.getElementById('test-performance');
      if (resultsList.length === 0) {
        perfContainer.innerHTML = '<p class="text-muted">No results yet</p>';
      } else {
        const avg = Math.round(resultsList.reduce((s, r) => s + (r.percentage || 0), 0) / resultsList.length);
        const passed = resultsList.filter(r => r.percentage >= 40).length;
        const passRate = Math.round((passed / resultsList.length) * 100);
        perfContainer.innerHTML = `
          <div class="row g-3 mb-3">
            <div class="col-6 text-center"><div class="border rounded p-3"><div class="fs-4 fw-bold text-primary">${avg}%</div><div class="small text-muted">Average Score</div></div></div>
            <div class="col-6 text-center"><div class="border rounded p-3"><div class="fs-4 fw-bold text-success">${passRate}%</div><div class="small text-muted">Pass Rate</div></div></div>
          </div>
          <div class="small text-muted">
            <div class="d-flex justify-content-between mb-1"><span>Total Submissions</span><span class="fw-semibold text-dark">${resultsList.length}</span></div>
            <div class="d-flex justify-content-between mb-1"><span>Passed (≥40%)</span><span class="text-success fw-semibold">${passed}</span></div>
            <div class="d-flex justify-content-between"><span>Failed</span><span class="text-danger fw-semibold">${resultsList.length - passed}</span></div>
          </div>`;
      }

      // Role Distribution
      const usersData = users.docs.map(d => d.data());
      const roles = { admin: 0, teacher: 0, student: 0 };
      usersData.forEach(u => { if (roles[u.role] !== undefined) roles[u.role]++; });
      const total = usersData.length || 1;
      const roleColors = { admin: 'bg-danger', teacher: 'bg-primary', student: 'bg-success' };
      document.getElementById('role-distribution').innerHTML = Object.entries(roles).map(([role, count]) => `
        <div class="mb-3">
          <div class="d-flex justify-content-between mb-1">
            <span class="small text-capitalize fw-semibold">${role}s</span>
            <span class="small text-muted">${count} (${Math.round(count/total*100)}%)</span>
          </div>
          <div class="progress" style="height:8px;">
            <div class="progress-bar ${roleColors[role]}" style="width:${(count / total * 100)}%"></div>
          </div>
        </div>`).join('');

      // Recent Activity
      const logs = await ActivityLogService.getRecent(10);
      const actContainer = document.getElementById('recent-activity');
      if (logs.length === 0) {
        actContainer.innerHTML = '<p class="text-muted">No recent activity</p>';
      } else {
        actContainer.innerHTML = logs.map(l => `
          <div class="d-flex justify-content-between border-bottom py-2 small">
            <span>${l.action}</span>
            <span class="text-muted">${timeAgo(l.timestamp)}</span>
          </div>`).join('');
      }

      // Download Report logic
      const btnDownload = document.getElementById('btn-download-report');
      if (btnDownload) {
        btnDownload.addEventListener('click', () => {
          try {
            const wb = XLSX.utils.book_new();

            // Export Stats as a simple sheet
            const stats = [
              { Metric: 'Total Users', Value: users.size },
              { Metric: 'Total Courses', Value: courses.size },
              { Metric: 'Total Tests', Value: tests.size },
              { Metric: 'Total Submissions', Value: results.size }
            ];
            const statsSheet = XLSX.utils.json_to_sheet(stats);
            XLSX.utils.book_append_sheet(wb, statsSheet, "System Stats");

            // Export User Distribution
            const roleData = Object.entries(roles).map(([r, c]) => ({ Role: r, Count: c }));
            const roleSheet = XLSX.utils.json_to_sheet(roleData);
            XLSX.utils.book_append_sheet(wb, roleSheet, "User Distribution");

            XLSX.writeFile(wb, `Analytics_Report_${new Date().toISOString().split('T')[0]}.xlsx`);
            showToast('Analytics report downloaded!', 'success');
          } catch (err) {
            console.error('Report failed', err);
            showToast('Failed to generate report.', 'error');
          }
        });
      }
    } catch (e) {
      LMSLogger.database('Analytics failed to load', e);
      showToast(friendlyError(e), 'error');
    }
  </script>
</body>

</html>
