<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tests — Mechanical Academic Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <div class="top-bar">
      <button class="btn btn-light btn-sm menu-toggle" id="menu-toggle"><i class="bi bi-list"></i></button>
      <h4><i class="bi bi-pencil-square me-2"></i>Tests</h4>
      <div id="create-test-wrap"></div>
    </div>
    <div class="page-body">
      <!-- Teacher: Create Test -->
      <div class="card shadow-sm mb-4 d-none" id="create-test-card">
        <div class="card-header bg-white"><h6 class="mb-0"><i class="bi bi-plus-circle me-2"></i>Create Test</h6></div>
        <div class="card-body">
          <form id="create-test-form">
            <div class="row g-3 mb-3">
              <div class="col-md-4"><label class="form-label">Title</label><input type="text" id="test-title" class="form-control" required></div>
              <div class="col-md-4"><label class="form-label">Course</label><select id="test-course" class="form-select" required><option value="">Select</option></select></div>
              <div class="col-md-2"><label class="form-label">Duration (min)</label><input type="number" id="test-duration" class="form-control" value="30" min="5"></div>
              <div class="col-md-2"><label class="form-label">Attempts</label><input type="number" id="test-attempts" class="form-control" value="1" min="1"></div>
            </div>
            <div class="row g-3 mb-3">
              <div class="col-md-6"><label class="form-label"><i class="bi bi-clock me-1"></i>Start Time</label><input type="datetime-local" id="test-start" class="form-control" required></div>
              <div class="col-md-6"><label class="form-label"><i class="bi bi-clock-history me-1"></i>End Time</label><input type="datetime-local" id="test-end" class="form-control" required></div>
            </div>
            <div class="mb-3"><label class="form-label">Description</label><textarea id="test-desc" class="form-control" rows="2"></textarea></div>

            <!-- Questions Builder -->
            <h6>Questions</h6>
            <div id="questions-container"></div>
            <button type="button" class="btn btn-outline-primary btn-sm mb-3" id="add-question-btn"><i class="bi bi-plus me-1"></i>Add Question</button>

            <div class="mb-3 form-check">
              <input type="checkbox" class="form-check-input" id="test-show-results">
              <label class="form-check-label" for="test-show-results">Show results to students after submission</label>
            </div>

            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-primary"><i class="bi bi-check-circle me-1"></i>Publish Test</button>
            </div>
          </form>
        </div>
      </div>

      <!-- Test List -->
      <div class="card shadow-sm">
        <div class="card-header bg-white"><h6 class="mb-0"><i class="bi bi-list-ul me-2"></i>Available Tests</h6></div>
        <div class="card-body p-0">
          <table class="table table-striped table-hover mb-0">
            <thead class="table-light"><tr><th>Title</th><th>Duration</th><th>Questions</th><th>Status</th><th>Action</th></tr></thead>
            <tbody id="tests-table"><tr><td colspan="5" class="text-center text-muted py-4"><span class="spinner-border spinner-border-sm"></span></td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- Take Test Modal (fullscreen) -->
  <div class="modal fade" id="testModal" data-bs-backdrop="static" data-bs-keyboard="false">
    <div class="modal-dialog modal-xl modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="taking-title">Test</h5>
          <span class="badge bg-danger ms-2" id="timer-display">00:00</span>
        </div>
        <div class="modal-body" id="test-body"></div>
        <div class="modal-footer">
          <button class="btn btn-primary" id="submit-test-btn"><i class="bi bi-check-circle me-1"></i>Submit Test</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Secure Delete Modal -->
  <div class="modal fade" id="secureDeleteModal" tabindex="-1" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered border-danger">
      <div class="modal-content">
        <div class="modal-header bg-danger text-white">
          <h5 class="modal-title"><i class="bi bi-exclamation-triangle-fill me-2"></i>Secure Delete</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body text-center py-4 text-start">
          <p class="text-danger fw-bold my-2" id="secure-delete-msg">Are you sure you want to delete this test?</p>
          <div class="mt-4 text-start">
            <label class="form-label fw-bold">Confirm Account Password:</label>
            <input type="password" id="secure-delete-password" class="form-control" placeholder="Enter password to authorize">
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-danger" id="confirm-secure-delete-btn" disabled>
             <i class="bi bi-trash"></i> Permanently Delete
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import { initApp } from '../assets/js/core/router.js';
    import { TestService, CourseService, ResultService, EnrollmentService } from '../services/database.js';
    import { verifyCurrentPassword } from '../assets/js/core/auth.js';
    import { showToast, escapeHtml, formatTime, formatDateTime, closeModal } from '../assets/js/core/utils.js';

    // Test state helper
    function getTestState(test) {
      const now = Date.now();
      const start = test.startTime ? (test.startTime.toDate ? test.startTime.toDate().getTime() : new Date(test.startTime).getTime()) : 0;
      const end = test.endTime ? (test.endTime.toDate ? test.endTime.toDate().getTime() : new Date(test.endTime).getTime()) : Infinity;
      if (!start && !end) return { state: 'active', label: '<span class="badge bg-success">Active</span>' };
      if (now < start) return { state: 'upcoming', label: '<span class="badge bg-info">Upcoming</span>' };
      if (now >= start && now <= end) return { state: 'active', label: '<span class="badge bg-success">Active</span>' };
      return { state: 'expired', label: '<span class="badge bg-secondary">Expired</span>' };
    }

    let qCount = 0;
    try {
      const userData = await initApp();
      const isTeacher = userData.role !== 'student';

      // Teacher: show create form
      if (isTeacher) {
        document.getElementById('create-test-card').classList.remove('d-none');
        const courses = userData.role === 'admin' ? await CourseService.getAll() : await CourseService.getByTeacher(userData.uid);
        courses.forEach(c => document.getElementById('test-course').innerHTML += `<option value="${c.id}">${escapeHtml(c.title)}</option>`);

        document.getElementById('add-question-btn').addEventListener('click', addQuestion);
        addQuestion(); // Start with 1

        document.getElementById('create-test-form').addEventListener('submit', async (e) => {
          e.preventDefault();
          const questions = collectQuestions();
          if (questions.length === 0) { showToast('Add at least one question', 'error'); return; }

          const startVal = document.getElementById('test-start').value;
          const endVal = document.getElementById('test-end').value;
          if (!startVal || !endVal) { showToast('Start time and end time are required', 'error'); return; }
          if (new Date(endVal) <= new Date(startVal)) { showToast('End time must be after start time', 'error'); return; }

          const totalMarks = questions.reduce((s, q) => s + q.marks, 0);
          try {
            await TestService.create({
              title: document.getElementById('test-title').value.trim(),
              courseId: document.getElementById('test-course').value,
              duration: parseInt(document.getElementById('test-duration').value) || 30,
              attemptLimit: parseInt(document.getElementById('test-attempts').value) || 1,
              startTime: new Date(startVal).toISOString(),
              endTime: new Date(endVal).toISOString(),
              description: document.getElementById('test-desc').value.trim(),
              questions, totalMarks,
              showResultToStudents: document.getElementById('test-show-results').checked,
              createdBy: userData.uid
            });
            showToast('Test published!', 'success');
            e.target.reset();
            document.getElementById('questions-container').innerHTML = '';
            qCount = 0; addQuestion();
            loadTests();
          } catch (err) { showToast(err.message, 'error'); }
        });
      }

      // Load tests
      async function loadTests() {
        let tests;
        if (userData.role === 'student') {
          const enrolled = await EnrollmentService.getByStudent(userData.uid);
          const courseIds = enrolled.map(e => e.courseId);
          const all = await TestService.getAll();
          tests = all.filter(t => courseIds.includes(t.courseId));
        } else if (userData.role === 'teacher') {
          tests = await TestService.getByCreator(userData.uid);
        } else {
          tests = await TestService.getAll();
        }

        const tbody = document.getElementById('tests-table');
        if (tests.length === 0) {
          tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted py-4">No tests available</td></tr>';
          return;
        }
        tbody.innerHTML = tests.map(t => {
          const { state, label } = getTestState(t);
          let actionBtn = '';
          if (userData.role === 'student') {
            if (state === 'active') {
              actionBtn = `<button class="btn btn-success btn-sm start-test-btn" data-id="${t.id}"><i class="bi bi-play me-1"></i>Start</button>`;
            } else if (state === 'upcoming') {
              actionBtn = `<span class="text-muted small">Not yet available</span>`;
            } else {
              actionBtn = `<span class="text-muted small">Closed</span>`;
            }
          } else {
            actionBtn = `<button class="btn btn-outline-danger btn-sm del-test-btn" data-id="${t.id}"><i class="bi bi-trash"></i></button>`;
          }
          return `<tr>
            <td class="fw-medium">${escapeHtml(t.title)}</td>
            <td>${t.duration} min</td>
            <td>${t.questions?.length || 0}</td>
            <td>${label}</td>
            <td>${actionBtn}</td>
          </tr>`;
        }).join('');

        // Start test (students only, active tests only)
        tbody.querySelectorAll('.start-test-btn').forEach(btn => {
          btn.addEventListener('click', async () => {
            const test = tests.find(t => t.id === btn.dataset.id);
            const testState = getTestState(test);
            if (testState.state !== 'active') { showToast('This test is not currently active', 'warning'); return; }
            const attempts = await ResultService.hasAttempted(test.id, userData.uid);
            if (attempts >= (test.attemptLimit || 1)) { showToast('Maximum attempts reached', 'warning'); return; }
            startTest(test);
          });
        });

        // ── Secure Delete Test ──
        let activeTestDeleteId = null;
        tbody.querySelectorAll('.del-test-btn').forEach(btn => {
          btn.addEventListener('click', () => {
             activeTestDeleteId = btn.dataset.id;
             document.getElementById('secure-delete-msg').textContent = 'Delete this test? All student results related to this test will also be lost.';
             document.getElementById('secure-delete-password').value = '';
             document.getElementById('confirm-secure-delete-btn').disabled = true;
             new bootstrap.Modal(document.getElementById('secureDeleteModal')).show();
          });
        });

        const passInput = document.getElementById('secure-delete-password');
        const confirmBtn = document.getElementById('confirm-secure-delete-btn');
        if(passInput && confirmBtn) {
           const newPassInput = passInput.cloneNode(true);
           const newConfirmBtn = confirmBtn.cloneNode(true);
           passInput.parentNode.replaceChild(newPassInput, passInput);
           confirmBtn.parentNode.replaceChild(newConfirmBtn, confirmBtn);
           
           newPassInput.addEventListener('input', (e) => {
              newConfirmBtn.disabled = (e.target.value.length < 6);
           });
           
           newConfirmBtn.addEventListener('click', async (e) => {
              const pass = newPassInput.value;
              const btn = e.target;
              btn.disabled = true;
              btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>Verifying...';
              
              try {
                 await verifyCurrentPassword(pass);
                 await TestService.delete(activeTestDeleteId);
                 closeModal('secureDeleteModal');
                 showToast('Test and results deleted successfully', 'success');
                 loadTests();
              } catch(err) {
                 showToast(err.message || 'Incorrect Password', 'error');
                 btn.disabled = false;
                 btn.innerHTML = '<i class="bi bi-trash"></i> Permanently Delete';
              }
           });
        }
      }

      // Start Test
      let timerInterval;
      function startTest(test) {
        document.getElementById('taking-title').textContent = test.title;
        const questions = test.questions || [];
        let timeLeft = (test.duration || 30) * 60;

        document.getElementById('test-body').innerHTML = questions.map((q, i) => `
          <div class="card mb-3">
            <div class="card-body">
              <h6>Q${i+1}. ${escapeHtml(q.question)} <small class="text-muted">(${q.marks} marks)</small></h6>
              ${q.type === 'mcq' ? q.options.map((o, j) => `
                <div class="form-check"><input class="form-check-input" type="radio" name="q${i}" value="${j}"><label class="form-check-label">${escapeHtml(o)}</label></div>
              `).join('') : q.type === 'trueFalse' ? `
                <div class="form-check"><input class="form-check-input" type="radio" name="q${i}" value="true"><label class="form-check-label">True</label></div>
                <div class="form-check"><input class="form-check-input" type="radio" name="q${i}" value="false"><label class="form-check-label">False</label></div>
              ` : `<input type="text" class="form-control" name="q${i}" placeholder="Your answer...">`}
            </div>
          </div>`).join('');

        new bootstrap.Modal(document.getElementById('testModal')).show();

        timerInterval = setInterval(() => {
          timeLeft--;
          document.getElementById('timer-display').textContent = formatTime(timeLeft);
          if (timeLeft <= 0) { clearInterval(timerInterval); submitTest(test); }
        }, 1000);

        document.getElementById('submit-test-btn').onclick = () => { clearInterval(timerInterval); submitTest(test); };
      }

      async function submitTest(test) {
        const questions = test.questions || [];
        let score = 0, correct = 0, wrong = 0;
        const answers = questions.map((q, i) => {
          let ans;
          if (q.type === 'short') {
            ans = document.querySelector(`input[name="q${i}"]`)?.value || '';
          } else {
            ans = document.querySelector(`input[name="q${i}"]:checked`)?.value || '';
          }
          const isCorrect = String(ans).toLowerCase() === String(q.correctAnswer).toLowerCase();
          if (isCorrect) { score += q.marks; correct++; } else if (ans) { wrong++; }
          return { question: q.question, answer: ans, correct: isCorrect };
        });

        const percentage = Math.round((score / (test.totalMarks || 1)) * 100);
        await ResultService.submit({
          testId: test.id, courseId: test.courseId, studentId: userData.uid, studentName: userData.name,
          answers, score, totalMarks: test.totalMarks, percentage, correctCount: correct, wrongCount: wrong
        });

        bootstrap.Modal.getInstance(document.getElementById('testModal'))?.hide();
        showToast(`Test submitted! Score: ${percentage}%`, percentage >= 40 ? 'success' : 'warning');
        loadTests();
      }

      loadTests();

      function addQuestion() {
        qCount++;
        const div = document.createElement('div');
        div.className = 'card mb-2';
        div.id = `q-${qCount}`;
        div.innerHTML = `<div class="card-body">
          <div class="d-flex justify-content-between align-items-center mb-2">
            <strong class="small">Question ${qCount}</strong>
            <button type="button" class="btn btn-outline-danger btn-sm py-0" onclick="document.getElementById('q-${qCount}').remove()"><i class="bi bi-trash"></i></button>
          </div>
          <div class="row g-2 mb-2">
            <div class="col-md-6"><input type="text" class="form-control q-text" placeholder="Question text" required></div>
            <div class="col-md-3"><select class="form-select q-type"><option value="mcq">MCQ</option><option value="trueFalse">True/False</option><option value="short">Short Answer</option></select></div>
            <div class="col-md-3"><input type="number" class="form-control q-marks" value="1" min="1" placeholder="Marks"></div>
          </div>
          <div class="q-options">
            <div class="row g-2"><div class="col-6"><input type="text" class="form-control form-control-sm opt" placeholder="Option A"></div><div class="col-6"><input type="text" class="form-control form-control-sm opt" placeholder="Option B"></div></div>
            <div class="row g-2 mt-1"><div class="col-6"><input type="text" class="form-control form-control-sm opt" placeholder="Option C"></div><div class="col-6"><input type="text" class="form-control form-control-sm opt" placeholder="Option D"></div></div>
          </div>
          <div class="mt-2"><input type="text" class="form-control form-control-sm q-answer" placeholder="Correct answer (e.g. 0 for Option A, or text)"></div>
        </div>`;
        document.getElementById('questions-container').appendChild(div);

        div.querySelector('.q-type').addEventListener('change', function() {
          const optDiv = div.querySelector('.q-options');
          optDiv.style.display = this.value === 'mcq' ? '' : 'none';
        });
      }

      function collectQuestions() {
        const cards = document.querySelectorAll('#questions-container .card');
        return Array.from(cards).map(card => {
          const type = card.querySelector('.q-type').value;
          const options = type === 'mcq' ? Array.from(card.querySelectorAll('.opt')).map(o => o.value) : [];
          return {
            question: card.querySelector('.q-text').value,
            type,
            options,
            correctAnswer: card.querySelector('.q-answer').value,
            marks: parseInt(card.querySelector('.q-marks').value) || 1
          };
        }).filter(q => q.question);
      }

    } catch (e) { console.error(e); }
  </script>
</body>
</html>
