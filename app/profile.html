<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Profile — Mechanical Academic Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <div class="top-bar">
      <button class="btn btn-light btn-sm menu-toggle" id="menu-toggle"><i class="bi bi-list"></i></button>
      <h4><i class="bi bi-person-circle me-2"></i>Profile</h4>
      <div></div>
    </div>
    <div class="page-body">
      <div class="row justify-content-center">
        <div class="col-lg-6">
          <!-- Profile Card -->
          <div class="card shadow-sm mb-4 text-center">
            <div class="card-body py-4">
              <div class="user-avatar mx-auto mb-3" style="width:64px;height:64px;font-size:1.5rem;" id="profile-avatar">?</div>
              <h5 class="mb-1" id="profile-name">—</h5>
              <p class="text-muted small mb-2" id="profile-email">—</p>
              <div id="profile-role"></div>
            </div>
          </div>

          <!-- Edit Profile -->
          <div class="card shadow-sm mb-4">
            <div class="card-header bg-white"><h6 class="mb-0"><i class="bi bi-pencil me-2"></i>Edit Profile</h6></div>
            <div class="card-body">
              <form id="edit-form">
                <div class="mb-3"><label class="form-label">Full Name</label><input type="text" id="edit-name" class="form-control" required></div>
                <div class="row g-3 mb-3">
                  <div class="col"><label class="form-label">URN</label><input type="text" id="edit-urn" class="form-control"></div>
                  <div class="col"><label class="form-label">Roll No</label><input type="text" id="edit-roll" class="form-control"></div>
                </div>
                <div class="mb-3"><label class="form-label">Phone</label><input type="tel" id="edit-phone" class="form-control"></div>
                <button type="submit" class="btn btn-primary w-100"><i class="bi bi-check-circle me-1"></i>Save Changes</button>
              </form>
            </div>
          </div>

          <!-- Secure Password Change -->
          <div class="card shadow-sm">
            <div class="card-header bg-white"><h6 class="mb-0"><i class="bi bi-shield-lock me-2"></i>Change Password</h6></div>
            <div class="card-body">
              <form id="password-form">
                <div class="mb-3">
                  <label class="form-label">Old Password <span class="text-danger">*</span></label>
                  <input type="password" id="old-pass" class="form-control" required placeholder="Enter current password">
                </div>
                <div class="mb-3">
                  <label class="form-label">New Password <span class="text-danger">*</span></label>
                  <input type="password" id="new-pass" class="form-control" required minlength="6" placeholder="Min 6 characters">
                </div>
                <div class="mb-3">
                  <label class="form-label">Confirm New Password <span class="text-danger">*</span></label>
                  <input type="password" id="confirm-pass" class="form-control" required placeholder="Re-enter new password">
                </div>
                <button type="submit" class="btn btn-warning w-100" id="change-pass-btn">
                  <i class="bi bi-key me-1"></i>Update Password
                </button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import { initApp } from '../assets/js/core/router.js';
    import { reauthAndChangePassword } from '../assets/js/core/auth.js';
    import { UserService } from '../services/database.js';
    import { showToast, getInitials, getRoleBadge } from '../assets/js/core/utils.js';

    try {
      const userData = await initApp();
      document.getElementById('profile-avatar').textContent = getInitials(userData.name);
      document.getElementById('profile-name').textContent = userData.name || '—';
      document.getElementById('profile-email').textContent = userData.email || '—';
      document.getElementById('profile-role').innerHTML = getRoleBadge(userData.role);

      document.getElementById('edit-name').value = userData.name || '';
      document.getElementById('edit-urn').value = userData.urn || '';
      document.getElementById('edit-roll').value = userData.rollNo || '';
      document.getElementById('edit-phone').value = userData.phone || '';

      // Edit profile
      document.getElementById('edit-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        await UserService.update(userData.uid, {
          name: document.getElementById('edit-name').value.trim(),
          urn: document.getElementById('edit-urn').value.trim(),
          rollNo: document.getElementById('edit-roll').value.trim(),
          phone: document.getElementById('edit-phone').value.trim()
        });
        showToast('Profile updated!', 'success');
        setTimeout(() => location.reload(), 800);
      });

      // Secure password change (old password required)
      document.getElementById('password-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const oldPass = document.getElementById('old-pass').value;
        const newPass = document.getElementById('new-pass').value;
        const confirmPass = document.getElementById('confirm-pass').value;

        if (newPass !== confirmPass) {
          showToast('New passwords do not match', 'error');
          return;
        }
        if (newPass.length < 6) {
          showToast('Password must be at least 6 characters', 'error');
          return;
        }

        const btn = document.getElementById('change-pass-btn');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>Verifying...';

        try {
          await reauthAndChangePassword(oldPass, newPass);
          showToast('Password updated successfully!', 'success');
          e.target.reset();
        } catch (err) {
          showToast(err.message || 'Password change failed', 'error');
        }

        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-key me-1"></i>Update Password';
      });
    } catch (e) { console.error(e); }
  </script>
</body>
</html>
