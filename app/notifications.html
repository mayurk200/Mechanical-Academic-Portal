<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Notifications — Mechanical Academic Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <div class="top-bar">
      <button class="btn btn-light btn-sm menu-toggle" id="menu-toggle"><i class="bi bi-list"></i></button>
      <h4><i class="bi bi-bell me-2"></i>Notifications</h4>
      <button class="btn btn-outline-secondary btn-sm" id="mark-all-read"><i class="bi bi-check-all me-1"></i>Mark all read</button>
    </div>
    <div class="page-body">
      <div class="card shadow-sm">
        <div class="card-body" id="notifications-list">
          <div class="text-center py-4"><span class="spinner-border"></span></div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import { initApp } from '../assets/js/core/router.js';
    import { NotificationService } from '../services/database.js';
    import { showToast, timeAgo } from '../assets/js/core/utils.js';

    try {
      const userData = await initApp();
      const notifications = await NotificationService.getByUser(userData.uid);
      const container = document.getElementById('notifications-list');

      if (notifications.length === 0) {
        container.innerHTML = '<div class="text-center text-muted py-5"><i class="bi bi-bell display-4 d-block mb-2"></i><p>No notifications — you\'re all caught up!</p></div>';
      } else {
        container.innerHTML = '<div class="list-group list-group-flush">' + notifications.map(n => `
          <div class="list-group-item d-flex gap-3 align-items-start ${n.read ? '' : 'bg-light'}" data-id="${n.id}" style="cursor:pointer;">
            <div class="flex-shrink-0">
              <i class="bi bi-${n.type === 'test' ? 'pencil-square' : n.type === 'assignment' ? 'clipboard-check' : n.type === 'result' ? 'graph-up' : 'info-circle'} fs-5 text-primary"></i>
            </div>
            <div class="flex-grow-1">
              <div class="fw-semibold small">${n.title || 'Notification'}</div>
              <div class="small text-muted">${n.message || ''}</div>
            </div>
            <small class="text-muted text-nowrap">${timeAgo(n.createdAt)}</small>
          </div>`).join('') + '</div>';

        container.querySelectorAll('.list-group-item.bg-light').forEach(el => {
          el.addEventListener('click', async () => {
            await NotificationService.markRead(el.dataset.id);
            el.classList.remove('bg-light');
          });
        });
      }

      document.getElementById('mark-all-read').addEventListener('click', async () => {
        await NotificationService.markAllRead(userData.uid);
        showToast('All marked as read', 'success');
        container.querySelectorAll('.bg-light').forEach(el => el.classList.remove('bg-light'));
      });
    } catch (e) { console.error(e); }
  </script>
</body>
</html>
