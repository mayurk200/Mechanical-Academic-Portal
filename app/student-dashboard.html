<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Student Dashboard — Mechanical Academic Portal</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
  <link rel="dns-prefetch" href="https://www.gstatic.com">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body>
  <aside class="sidebar" id="sidebar"></aside>

  <div class="main-content">
    <div class="top-bar">
      <button class="btn btn-light btn-sm menu-toggle" id="menu-toggle"><i class="bi bi-list"></i></button>
      <h4><i class="bi bi-speedometer2 me-2"></i>Dashboard</h4>
      <div></div>
    </div>

    <div class="page-body">
      <!-- Stats -->
      <div class="row g-3 mb-4">
        <div class="col-md-3 col-6">
          <div class="card stat-card shadow-sm">
            <div class="card-body">
              <div class="stat-icon blue"><i class="bi bi-book"></i></div>
              <div class="stat-value" id="stat-courses">—</div>
              <div class="stat-label">My Courses</div>
            </div>
          </div>
        </div>
        <div class="col-md-3 col-6">
          <div class="card stat-card shadow-sm">
            <div class="card-body">
              <div class="stat-icon green"><i class="bi bi-calendar-check"></i></div>
              <div class="stat-value" id="stat-attendance">—</div>
              <div class="stat-label">Attendance %</div>
            </div>
          </div>
        </div>
        <div class="col-md-3 col-6">
          <div class="card stat-card shadow-sm">
            <div class="card-body">
              <div class="stat-icon purple"><i class="bi bi-pencil-square"></i></div>
              <div class="stat-value" id="stat-tests">—</div>
              <div class="stat-label">Upcoming Tests</div>
            </div>
          </div>
        </div>
        <div class="col-md-3 col-6">
          <div class="card stat-card shadow-sm">
            <div class="card-body">
              <div class="stat-icon orange"><i class="bi bi-megaphone"></i></div>
              <div class="stat-value" id="stat-announcements">—</div>
              <div class="stat-label">Announcements</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Attendance Per Course -->
      <div class="card shadow-sm mb-4">
        <div class="card-header bg-white">
          <h6 class="mb-0"><i class="bi bi-calendar-check me-2"></i>Attendance Per Course</h6>
        </div>
        <div class="card-body p-0">
          <table class="table table-striped table-hover mb-0">
            <thead class="table-light">
              <tr>
                <th>Course</th>
                <th>Present</th>
                <th>Total Classes</th>
                <th>Percentage</th>
              </tr>
            </thead>
            <tbody id="attendance-table">
              <tr>
                <td colspan="4" class="text-center text-muted py-3"><span
                    class="spinner-border spinner-border-sm"></span></td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Enrolled Courses (full width) -->
      <div class="card shadow-sm">
        <div class="card-header bg-white">
          <h6 class="mb-0"><i class="bi bi-book me-2"></i>My Courses</h6>
        </div>
        <div class="card-body" id="courses-list">
          <div class="text-center text-muted py-3"><span class="spinner-border spinner-border-sm"></span></div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import { initApp } from '../assets/js/core/router.js';
    import { loadStudentStats } from '../assets/js/modules/dashboard.js';
    import { AttendanceService } from '../services/database.js';
    import { escapeHtml } from '../assets/js/core/utils.js';

    try {
      const userData = await initApp(['student']);
      const stats = await loadStudentStats(userData.uid);

      document.getElementById('stat-courses').textContent = stats.enrolledCourses;
      document.getElementById('stat-tests').textContent = stats.availableTests;
      document.getElementById('stat-announcements').textContent = '0';

      // Fetch overall attendance + per-course attendance in PARALLEL
      const attTbody = document.getElementById('attendance-table');
      const [overallAtt, ...courseAttendances] = await Promise.all([
        AttendanceService.getStudentPercentage(userData.uid),
        ...stats.courses.map(c => AttendanceService.getStudentPercentage(userData.uid, c.id))
      ]);

      // Overall attendance %
      const attColor = overallAtt.percentage >= 75 ? 'text-success' : 'text-danger';
      document.getElementById('stat-attendance').innerHTML = `<span class="${attColor}">${overallAtt.percentage}%</span>`;

      // Attendance per course
      if (stats.courses.length > 0) {
        attTbody.innerHTML = stats.courses.map((course, i) => {
          const att = courseAttendances[i];
          const cls = att.percentage >= 75 ? 'text-success' : att.percentage > 0 ? 'text-danger' : 'text-muted';
          const warn = att.percentage > 0 && att.percentage < 75 ? ' <i class="bi bi-exclamation-triangle text-danger" title="Low attendance"></i>' : '';
          return `<tr>
            <td>${escapeHtml(course.title)}</td>
            <td>${att.present}</td><td>${att.total}</td>
            <td class="${cls} fw-bold">${att.percentage}%${warn}</td>
          </tr>`;
        }).join('');
      } else {
        attTbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted py-3">No courses</td></tr>';
      }

      // Courses list
      const coursesList = document.getElementById('courses-list');
      if (stats.courses.length > 0) {
        coursesList.innerHTML = stats.courses.map(c => `
          <div class="d-flex justify-content-between align-items-center p-3 border-bottom">
            <div><div class="fw-semibold">${escapeHtml(c.title)}</div><small class="text-muted">${c.code || ''}</small></div>
            <a href="course-detail.html?id=${c.id}" class="btn btn-outline-primary btn-sm"><i class="bi bi-eye me-1"></i>View</a>
          </div>`).join('');
      } else {
        coursesList.innerHTML = '<div class="text-center text-muted py-4">No courses assigned</div>';
      }
    } catch (e) { console.error(e); }
  </script>
</body>

</html>
