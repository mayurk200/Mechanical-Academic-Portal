<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Results — Mechanical Academic Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
  <style>
    .flag-clean {
      background: #d1e7dd !important;
    }

    .flag-warn {
      background: #fff3cd !important;
    }

    .flag-danger {
      background: #f8d7da !important;
    }

    .violation-badge {
      font-size: 0.72rem;
      padding: 2px 7px;
      border-radius: 10px;
      margin-right: 3px;
      white-space: nowrap;
    }

    .vb-copy {
      background: #dc3545;
      color: #fff;
    }

    .vb-tab {
      background: #fd7e14;
      color: #fff;
    }

    .vb-fs {
      background: #6f42c1;
      color: #fff;
    }

    .vb-dev {
      background: #0d6efd;
      color: #fff;
    }

    .vb-auto {
      background: #212529;
      color: #fff;
    }

    .activity-log-row td {
      padding: 6px 10px !important;
      font-size: 0.82rem;
    }

    .log-type {
      font-weight: 700;
      text-transform: uppercase;
      font-size: 0.7rem;
    }

    .log-type.copy_attempt {
      color: #dc3545;
    }

    .log-type.tab_attempt {
      color: #fd7e14;
    }

    .log-type.fullscreen_attempt {
      color: #6f42c1;
    }

    .log-type.devtools_attempt {
      color: #0d6efd;
    }

    .log-type.auto_submit {
      color: #212529;
    }

    .log-type.test_start,
    .log-type.test_submit {
      color: #198754;
    }
  </style>
</head>

<body>
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <div class="top-bar">
      <button class="btn btn-light btn-sm menu-toggle" id="menu-toggle"><i class="bi bi-list"></i></button>
      <h4><i class="bi bi-graph-up me-2"></i>Results</h4>
      <div></div>
    </div>
    <div class="page-body">
      <!-- Teacher: Test Management Panel -->
      <div class="d-none" id="teacher-panel">
        <div class="card shadow-sm mb-4">
          <div class="card-header bg-white">
            <h6 class="mb-0"><i class="bi bi-sliders me-2"></i>Test Management</h6>
          </div>
          <div class="card-body p-0">
            <table class="table table-striped table-hover mb-0">
              <thead class="table-light">
                <tr>
                  <th>Test Name</th>
                  <th>Course</th>
                  <th>Total Students</th>
                  <th>Avg Score</th>
                  <th>Result Visibility</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="test-management-tbody">
                <tr>
                  <td colspan="6" class="text-center text-muted py-4"><span
                      class="spinner-border spinner-border-sm"></span></td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

        <!-- Teacher: Select test for detailed results -->
        <div class="row mb-3">
          <div class="col-md-4">
            <select id="test-select" class="form-select">
              <option value="">— Select Test for Details —</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Stats cards -->
      <div class="row g-3 mb-4 d-none" id="stats-row">
        <div class="col-md-3 col-6">
          <div class="card stat-card shadow-sm">
            <div class="card-body">
              <div class="stat-icon blue"><i class="bi bi-bar-chart"></i></div>
              <div class="stat-value" id="avg-score">—</div>
              <div class="stat-label">Average Score</div>
            </div>
          </div>
        </div>
        <div class="col-md-3 col-6">
          <div class="card stat-card shadow-sm">
            <div class="card-body">
              <div class="stat-icon green"><i class="bi bi-arrow-up-circle"></i></div>
              <div class="stat-value" id="high-score">—</div>
              <div class="stat-label">Highest</div>
            </div>
          </div>
        </div>
        <div class="col-md-3 col-6">
          <div class="card stat-card shadow-sm">
            <div class="card-body">
              <div class="stat-icon red"><i class="bi bi-arrow-down-circle"></i></div>
              <div class="stat-value" id="low-score">—</div>
              <div class="stat-label">Lowest</div>
            </div>
          </div>
        </div>
        <div class="col-md-3 col-6">
          <div class="card stat-card shadow-sm">
            <div class="card-body">
              <div class="stat-icon purple"><i class="bi bi-people"></i></div>
              <div class="stat-value" id="total-submissions">—</div>
              <div class="stat-label">Submissions</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Results Table -->
      <div class="card shadow-sm">
        <div class="card-header bg-white d-flex justify-content-between align-items-center">
          <h6 class="mb-0"><i class="bi bi-table me-2"></i>Results</h6>
          <button class="btn btn-sm btn-outline-success d-none" id="download-results-btn">
            <i class="bi bi-file-earmark-spreadsheet me-1"></i>Download Results (.xlsx)
          </button>
        </div>
        <div class="card-body p-0">
          <table class="table table-striped table-hover mb-0">
            <thead class="table-light" id="results-thead">
              <tr>
                <th>#</th>
                <th>Student</th>
                <th>Roll No</th>
                <th>URN</th>
                <th>Score</th>
                <th>Percentage</th>
                <th>Date</th>
              </tr>
            </thead>
            <tbody id="results-table">
              <tr>
                <td colspan="7" class="text-center text-muted py-4">Select a test or view your results</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Activity Log Detail Modal -->
      <div class="modal fade" id="activityLogModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-scrollable">
          <div class="modal-content">
            <div class="modal-header bg-dark text-white">
              <h5 class="modal-title"><i class="bi bi-shield-exclamation me-2"></i>Exam Activity Log</h5>
              <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-0" id="activity-log-body">
              <div class="text-center py-4 text-muted"><span class="spinner-border spinner-border-sm"></span> Loading...
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- SheetJS for Excel Export -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script type="module">
    import { initApp } from '../assets/js/core/router.js';
    import { TestService, ResultService, EnrollmentService, CourseService, UserService, ExamActivityLogService } from '../services/database.js';
    import { showToast, formatDate, escapeHtml } from '../assets/js/core/utils.js';

    try {
      const userData = await initApp();

      if (userData.role === 'student') {
        // ── STUDENT VIEW: check visibility before showing results ──
        const results = await ResultService.getByStudent(userData.uid);

        // Optimize: Cache test fetching to avoid duplicate queries for multiple attempts of same test,
        // and resolve all promises concurrently.
        const testCache = new Map();

        const resolveTest = async (testId) => {
          if (!testCache.has(testId)) testCache.set(testId, TestService.get(testId));
          return testCache.get(testId);
        };

        const resolvedTests = await Promise.all(results.map(r => resolveTest(r.testId)));

        const visibleResults = results.filter((r, idx) => {
          const test = resolvedTests[idx];
          if (test && String(test.showResultToStudents) === 'true') {
            r.testTitle = test.title;
            return true;
          }
          return false;
        });

        if (visibleResults.length === 0) {
          document.getElementById('results-table').innerHTML =
            '<tr><td colspan="7" class="text-center text-muted py-4"><i class="bi bi-eye-slash me-1"></i>Results are not yet published by the teacher.</td></tr>';
        } else {
          renderResults(visibleResults, true);
        }

      } else {
        // ── TEACHER/ADMIN VIEW ──
        document.getElementById('teacher-panel').classList.remove('d-none');
        const tests = userData.role === 'admin' ? await TestService.getAll() : await TestService.getByCreator(userData.uid);
        const courses = userData.role === 'admin' ? await CourseService.getAll() : await CourseService.getByTeacher(userData.uid);
        const courseMap = {};
        courses.forEach(c => courseMap[c.id] = c.title);

        // Populate test selector
        const sel = document.getElementById('test-select');
        tests.forEach(t => sel.innerHTML += `<option value="${t.id}">${escapeHtml(t.title)}</option>`);

        // Management panel — show all tests with visibility toggle
        const mgmtTbody = document.getElementById('test-management-tbody');
        if (tests.length === 0) {
          mgmtTbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-4">No tests</td></tr>';
        } else {
          // Optimize: chunk concurrent promises to prevent network backlog/crashing if tests array is huge
          const CHUNK_SIZE = 10;
          let htmlRows = [];
          for (let i = 0; i < tests.length; i += CHUNK_SIZE) {
            const chunk = tests.slice(i, i + CHUNK_SIZE);
            const chunkRows = await Promise.all(chunk.map(async t => {
              const results = await ResultService.getByTest(t.id);
              const avg = results.length > 0 ? Math.round(results.reduce((s, r) => s + (r.percentage || 0), 0) / results.length) : 0;
              const vis = String(t.showResultToStudents) === 'true';
              return `<tr>
                <td class="fw-medium">${escapeHtml(t.title)}</td>
                <td class="text-muted small">${courseMap[t.courseId] || '—'}</td>
                <td>${results.length}</td>
                <td>${avg}%</td>
                <td>
                  <div class="form-check form-switch">
                    <input class="form-check-input toggle-vis" type="checkbox" data-id="${t.id}" ${vis ? 'checked' : ''}>
                    <label class="form-check-label small">${vis ? '<span class="text-success">ON</span>' : '<span class="text-danger">OFF</span>'}</label>
                  </div>
                </td>
                <td><a href="#" class="btn btn-outline-primary btn-sm view-results-btn" data-id="${t.id}"><i class="bi bi-eye me-1"></i>View</a></td>
              </tr>`;
            }));
            htmlRows.push(...chunkRows);
          }
          mgmtTbody.innerHTML = htmlRows.join('');

          // Toggle visibility
          mgmtTbody.querySelectorAll('.toggle-vis').forEach(toggle => {
            toggle.addEventListener('change', async () => {
              const newState = await TestService.toggleResultVisibility(toggle.dataset.id);
              const label = toggle.nextElementSibling;
              label.innerHTML = newState ? '<span class="text-success">ON</span>' : '<span class="text-danger">OFF</span>';
              showToast(`Results ${newState ? 'visible' : 'hidden'} for students`, 'success');
            });
          });

          // View results buttons
          mgmtTbody.querySelectorAll('.view-results-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
              e.preventDefault();
              sel.value = btn.dataset.id;
              sel.dispatchEvent(new Event('change'));
            });
          });
        }

        // Load detailed results when test selected
        sel.addEventListener('change', async () => {
          if (!sel.value) return;
          const results = await ResultService.getByTest(sel.value);
          renderResults(results, false, sel.value);
        });
      }

      async function renderResults(results, isStudent, testId = null) {
        const tbody = document.getElementById('results-table');
        const thead = document.getElementById('results-thead');

        // Store for Excel export
        _lastRenderedResults = results;
        _lastRenderedIsStudent = isStudent;
        _lastRenderedTestId = testId;

        if (results.length === 0) {
          tbody.innerHTML = '<tr><td colspan="9" class="text-center text-muted py-4">No results found</td></tr>';
          document.getElementById('stats-row').classList.add('d-none');
          document.getElementById('download-results-btn').classList.add('d-none');
          return;
        }

        // Show download button
        document.getElementById('download-results-btn').classList.remove('d-none');

        // Stats
        document.getElementById('stats-row').classList.remove('d-none');
        const percs = results.map(r => r.percentage || 0);
        document.getElementById('avg-score').textContent = Math.round(percs.reduce((a, b) => a + b, 0) / percs.length) + '%';
        document.getElementById('high-score').textContent = Math.max(...percs) + '%';
        document.getElementById('low-score').textContent = Math.min(...percs) + '%';
        document.getElementById('total-submissions').textContent = results.length;

        // Update table header for teacher/admin view (add activity columns)
        if (!isStudent) {
          thead.innerHTML = `<tr>
            <th>#</th><th>Student</th><th>Roll No</th><th>URN</th>
            <th>Score</th><th>Percentage</th><th>Submission</th>
            <th>⚠️ Activity</th><th>Actions</th>
          </tr>`;
        } else {
          thead.innerHTML = `<tr><th>#</th><th>Test</th><th>Roll No</th><th>URN</th><th>Score</th><th>Percentage</th><th>Date</th></tr>`;
        }

        // Enrich with user details
        const enriched = await Promise.all(results.map(async (r, i) => {
          const user = isStudent ? null : await UserService.get(r.studentId);
          return { ...r, _user: user };
        }));

        if (isStudent) {
          tbody.innerHTML = enriched.map((r, i) => {
            const color = r.percentage >= 70 ? 'text-success' : r.percentage >= 40 ? 'text-warning' : 'text-danger';
            return `<tr>
              <td>${i + 1}</td>
              <td>${r.testTitle || '—'}</td>
              <td>${r._user?.rollNo || '—'}</td>
              <td>${r._user?.urn || '—'}</td>
              <td>${r.score}/${r.totalMarks}</td>
              <td class="${color} fw-bold">${r.percentage}%</td>
              <td class="text-muted small">${formatDate(r.submittedAt)}</td>
            </tr>`;
          }).join('');
        } else {
          // Teacher/Admin view with violation badges
          tbody.innerHTML = enriched.map((r, i) => {
            const color = r.percentage >= 70 ? 'text-success' : r.percentage >= 40 ? 'text-warning' : 'text-danger';
            const totalViolations = (r.copyAttempts || 0) + (r.tabSwitches || 0) + (r.fullscreenExits || 0) + (r.devtoolsAttempts || 0);

            // Row color based on violations
            let rowClass = '';
            if (r.autoSubmitted) rowClass = 'flag-danger';
            else if (totalViolations >= 3) rowClass = 'flag-warn';
            else if (totalViolations > 0) rowClass = '';

            // Violation badges
            let badges = '';
            if (r.copyAttempts > 0) badges += `<span class="violation-badge vb-copy">📋 ${r.copyAttempts}</span>`;
            if (r.tabSwitches > 0) badges += `<span class="violation-badge vb-tab">🔄 ${r.tabSwitches}</span>`;
            if (r.fullscreenExits > 0) badges += `<span class="violation-badge vb-fs">🖥️ ${r.fullscreenExits}</span>`;
            if (r.devtoolsAttempts > 0) badges += `<span class="violation-badge vb-dev">🔧 ${r.devtoolsAttempts}</span>`;
            if (r.autoSubmitted) badges += `<span class="violation-badge vb-auto">⚡ Auto</span>`;
            if (totalViolations === 0 && !r.autoSubmitted) badges = '<span class="text-success small">✅ Clean</span>';

            // Submission type
            const subType = r.submissionType || 'manual';
            const subLabel = subType === 'manual' ? '<span class="text-success small">Manual</span>'
              : `<span class="text-danger small fw-bold">${subType.replace('auto_', 'Auto: ')}</span>`;

            return `<tr class="${rowClass}">
              <td>${i + 1}</td>
              <td>${r.studentName || r._user?.name || '—'}</td>
              <td>${r._user?.rollNo || '—'}</td>
              <td>${r._user?.urn || '—'}</td>
              <td>${r.score}/${r.totalMarks}</td>
              <td class="${color} fw-bold">${r.percentage}%</td>
              <td>${subLabel}</td>
              <td>${badges}</td>
              <td><button class="btn btn-outline-dark btn-sm view-log-btn" data-test-id="${r.testId}" data-student-id="${r.studentId}" data-student-name="${escapeHtml(r.studentName || r._user?.name || '—')}"><i class="bi bi-journal-text"></i></button></td>
            </tr>`;
          }).join('');

          // View activity log buttons
          tbody.querySelectorAll('.view-log-btn').forEach(btn => {
            btn.addEventListener('click', async () => {
              const tId = btn.dataset.testId;
              const sId = btn.dataset.studentId;
              const sName = btn.dataset.studentName;

              const modal = new bootstrap.Modal(document.getElementById('activityLogModal'));
              document.querySelector('#activityLogModal .modal-title').innerHTML = `<i class="bi bi-shield-exclamation me-2"></i>${sName} — Exam Activity`;
              document.getElementById('activity-log-body').innerHTML = '<div class="text-center py-4 text-muted"><span class="spinner-border spinner-border-sm"></span> Loading...</div>';
              modal.show();

              try {
                const logs = await ExamActivityLogService.getByTestAndStudent(tId, sId);
                if (logs.length === 0) {
                  document.getElementById('activity-log-body').innerHTML = '<div class="text-center py-4 text-muted">No activity logs found for this student.</div>';
                } else {
                  document.getElementById('activity-log-body').innerHTML = `
                    <table class="table table-sm mb-0">
                      <thead class="table-dark"><tr><th>Time</th><th>Type</th><th>Details</th></tr></thead>
                      <tbody>
                        ${logs.map(log => {
                    const time = log.timestamp?.toDate ? log.timestamp.toDate().toLocaleTimeString() : '—';
                    const typeClass = log.type || '';
                    return `<tr class="activity-log-row">
                            <td class="text-muted">${time}</td>
                            <td><span class="log-type ${typeClass}">${log.type || '—'}</span></td>
                            <td>${escapeHtml(log.message || '')}</td>
                          </tr>`;
                  }).join('')}
                      </tbody>
                    </table>`;
                }
              } catch (err) {
                document.getElementById('activity-log-body').innerHTML = `<div class="text-center py-4 text-danger">Error loading logs: ${err.message}</div>`;
              }
            });
          });
        }
      }
    } catch (e) { console.error(e); }

    // ── Download Results to Excel ──
    let _lastRenderedResults = [];
    let _lastRenderedIsStudent = false;
    let _lastRenderedTestId = null;

    // Patch renderResults to store data for export
    const origSetBtn = () => document.getElementById('download-results-btn');

    document.getElementById('download-results-btn').addEventListener('click', async () => {
      const btn = document.getElementById('download-results-btn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>Exporting...';

      try {
        const results = _lastRenderedResults;
        if (!results || results.length === 0) {
          btn.disabled = false;
          btn.innerHTML = '<i class="bi bi-file-earmark-spreadsheet me-1"></i>Download Results (.xlsx)';
          return;
        }

        let rows = [];
        if (_lastRenderedIsStudent) {
          rows = results.map(r => ({
            'Test Name': r.testTitle || '—',
            'Score': r.score,
            'Total Marks': r.totalMarks,
            'Percentage': r.percentage + '%',
            'Date': r.submittedAt?.toDate ? r.submittedAt.toDate().toLocaleDateString() : '—',
            'Status': (r.percentage >= 40) ? 'Pass' : 'Fail'
          }));
        } else {
          // Enrich with user data for admin/teacher view
          const enriched = await Promise.all(results.map(async r => {
            const user = await UserService.get(r.studentId);
            return { ...r, _user: user };
          }));

          // Get test name
          let testName = '—';
          if (_lastRenderedTestId) {
            const test = await TestService.get(_lastRenderedTestId);
            if (test) testName = test.title;
          }

          // Get course name
          let courseName = '—';
          if (enriched[0]?.courseId) {
            const course = await CourseService.get(enriched[0].courseId);
            if (course) courseName = course.title;
          }

          rows = enriched.map(r => ({
            'Student Name': r.studentName || r._user?.name || '—',
            'Roll No': r._user?.rollNo || '—',
            'URN': r._user?.urn || '—',
            'Course Name': courseName,
            'Test Name': testName,
            'Score': r.score,
            'Total Marks': r.totalMarks,
            'Percentage': r.percentage + '%',
            'Attempt Date': r.submittedAt?.toDate ? r.submittedAt.toDate().toLocaleDateString() : '—',
            'Status': (r.percentage >= 40) ? 'Pass' : 'Fail'
          }));
        }

        const ws = XLSX.utils.json_to_sheet(rows);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'Results');
        XLSX.writeFile(wb, `Results_${new Date().toISOString().split('T')[0]}.xlsx`);
      } catch (err) {
        console.error('Export failed:', err);
      }

      btn.disabled = false;
      btn.innerHTML = '<i class="bi bi-file-earmark-spreadsheet me-1"></i>Download Results (.xlsx)';
    });
  </script>
</body>

</html>
