<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Results — Mechanical Academic Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <div class="top-bar">
      <button class="btn btn-light btn-sm menu-toggle" id="menu-toggle"><i class="bi bi-list"></i></button>
      <h4><i class="bi bi-graph-up me-2"></i>Results</h4>
      <div></div>
    </div>
    <div class="page-body">
      <!-- Teacher: Test Management Panel -->
      <div class="d-none" id="teacher-panel">
        <div class="card shadow-sm mb-4">
          <div class="card-header bg-white"><h6 class="mb-0"><i class="bi bi-sliders me-2"></i>Test Management</h6></div>
          <div class="card-body p-0">
            <table class="table table-striped table-hover mb-0">
              <thead class="table-light"><tr><th>Test Name</th><th>Course</th><th>Total Students</th><th>Avg Score</th><th>Result Visibility</th><th>Actions</th></tr></thead>
              <tbody id="test-management-tbody"><tr><td colspan="6" class="text-center text-muted py-4"><span class="spinner-border spinner-border-sm"></span></td></tr></tbody>
            </table>
          </div>
        </div>

        <!-- Teacher: Select test for detailed results -->
        <div class="row mb-3">
          <div class="col-md-4">
            <select id="test-select" class="form-select"><option value="">— Select Test for Details —</option></select>
          </div>
        </div>
      </div>

      <!-- Stats cards -->
      <div class="row g-3 mb-4 d-none" id="stats-row">
        <div class="col-md-3 col-6"><div class="card stat-card shadow-sm"><div class="card-body"><div class="stat-icon blue"><i class="bi bi-bar-chart"></i></div><div class="stat-value" id="avg-score">—</div><div class="stat-label">Average Score</div></div></div></div>
        <div class="col-md-3 col-6"><div class="card stat-card shadow-sm"><div class="card-body"><div class="stat-icon green"><i class="bi bi-arrow-up-circle"></i></div><div class="stat-value" id="high-score">—</div><div class="stat-label">Highest</div></div></div></div>
        <div class="col-md-3 col-6"><div class="card stat-card shadow-sm"><div class="card-body"><div class="stat-icon red"><i class="bi bi-arrow-down-circle"></i></div><div class="stat-value" id="low-score">—</div><div class="stat-label">Lowest</div></div></div></div>
        <div class="col-md-3 col-6"><div class="card stat-card shadow-sm"><div class="card-body"><div class="stat-icon purple"><i class="bi bi-people"></i></div><div class="stat-value" id="total-submissions">—</div><div class="stat-label">Submissions</div></div></div></div>
      </div>

      <!-- Results Table -->
      <div class="card shadow-sm">
        <div class="card-header bg-white"><h6 class="mb-0"><i class="bi bi-table me-2"></i>Results</h6></div>
        <div class="card-body p-0">
          <table class="table table-striped table-hover mb-0">
            <thead class="table-light"><tr><th>#</th><th>Student</th><th>Roll No</th><th>URN</th><th>Score</th><th>Percentage</th><th>Date</th></tr></thead>
            <tbody id="results-table"><tr><td colspan="7" class="text-center text-muted py-4">Select a test or view your results</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import { initApp } from '../assets/js/core/router.js';
    import { TestService, ResultService, EnrollmentService, CourseService, UserService } from '../services/database.js';
    import { showToast, formatDate, escapeHtml } from '../assets/js/core/utils.js';

    try {
      const userData = await initApp();

      if (userData.role === 'student') {
        // ── STUDENT VIEW: check visibility before showing results ──
        const results = await ResultService.getByStudent(userData.uid);
        const visibleResults = [];

        for (const r of results) {
          const test = await TestService.get(r.testId);
          if (test && test.showResultToStudents === true) {
            visibleResults.push({ ...r, testTitle: test.title });
          }
        }

        if (visibleResults.length === 0) {
          document.getElementById('results-table').innerHTML =
            '<tr><td colspan="7" class="text-center text-muted py-4"><i class="bi bi-eye-slash me-1"></i>Results are not yet published by the teacher.</td></tr>';
        } else {
          renderResults(visibleResults, true);
        }

      } else {
        // ── TEACHER/ADMIN VIEW ──
        document.getElementById('teacher-panel').classList.remove('d-none');
        const tests = userData.role === 'admin' ? await TestService.getAll() : await TestService.getByCreator(userData.uid);
        const courses = userData.role === 'admin' ? await CourseService.getAll() : await CourseService.getByTeacher(userData.uid);
        const courseMap = {};
        courses.forEach(c => courseMap[c.id] = c.title);

        // Populate test selector
        const sel = document.getElementById('test-select');
        tests.forEach(t => sel.innerHTML += `<option value="${t.id}">${escapeHtml(t.title)}</option>`);

        // Management panel — show all tests with visibility toggle
        const mgmtTbody = document.getElementById('test-management-tbody');
        if (tests.length === 0) {
          mgmtTbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-4">No tests</td></tr>';
        } else {
          const rows = await Promise.all(tests.map(async t => {
            const results = await ResultService.getByTest(t.id);
            const avg = results.length > 0 ? Math.round(results.reduce((s, r) => s + (r.percentage || 0), 0) / results.length) : 0;
            const vis = t.showResultToStudents ? true : false;
            return `<tr>
              <td class="fw-medium">${escapeHtml(t.title)}</td>
              <td class="text-muted small">${courseMap[t.courseId] || '—'}</td>
              <td>${results.length}</td>
              <td>${avg}%</td>
              <td>
                <div class="form-check form-switch">
                  <input class="form-check-input toggle-vis" type="checkbox" data-id="${t.id}" ${vis ? 'checked' : ''}>
                  <label class="form-check-label small">${vis ? '<span class="text-success">ON</span>' : '<span class="text-danger">OFF</span>'}</label>
                </div>
              </td>
              <td><a href="#" class="btn btn-outline-primary btn-sm view-results-btn" data-id="${t.id}"><i class="bi bi-eye me-1"></i>View</a></td>
            </tr>`;
          }));
          mgmtTbody.innerHTML = rows.join('');

          // Toggle visibility
          mgmtTbody.querySelectorAll('.toggle-vis').forEach(toggle => {
            toggle.addEventListener('change', async () => {
              const newState = await TestService.toggleResultVisibility(toggle.dataset.id);
              const label = toggle.nextElementSibling;
              label.innerHTML = newState ? '<span class="text-success">ON</span>' : '<span class="text-danger">OFF</span>';
              showToast(`Results ${newState ? 'visible' : 'hidden'} for students`, 'success');
            });
          });

          // View results buttons
          mgmtTbody.querySelectorAll('.view-results-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
              e.preventDefault();
              sel.value = btn.dataset.id;
              sel.dispatchEvent(new Event('change'));
            });
          });
        }

        // Load detailed results when test selected
        sel.addEventListener('change', async () => {
          if (!sel.value) return;
          const results = await ResultService.getByTest(sel.value);
          renderResults(results, false);
        });
      }

      async function renderResults(results, isStudent) {
        const tbody = document.getElementById('results-table');
        if (results.length === 0) {
          tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted py-4">No results found</td></tr>';
          document.getElementById('stats-row').classList.add('d-none');
          return;
        }

        // Stats
        document.getElementById('stats-row').classList.remove('d-none');
        const percs = results.map(r => r.percentage || 0);
        document.getElementById('avg-score').textContent = Math.round(percs.reduce((a, b) => a + b, 0) / percs.length) + '%';
        document.getElementById('high-score').textContent = Math.max(...percs) + '%';
        document.getElementById('low-score').textContent = Math.min(...percs) + '%';
        document.getElementById('total-submissions').textContent = results.length;

        // Enrich with user details
        const enriched = await Promise.all(results.map(async (r, i) => {
          const user = isStudent ? null : await UserService.get(r.studentId);
          return { ...r, _user: user };
        }));

        tbody.innerHTML = enriched.map((r, i) => {
          const color = r.percentage >= 70 ? 'text-success' : r.percentage >= 40 ? 'text-warning' : 'text-danger';
          return `<tr>
            <td>${i + 1}</td>
            <td>${isStudent ? (r.testTitle || 'You') : (r.studentName || r._user?.name || '—')}</td>
            <td>${r._user?.rollNo || '—'}</td>
            <td>${r._user?.urn || '—'}</td>
            <td>${r.score}/${r.totalMarks}</td>
            <td class="${color} fw-bold">${r.percentage}%</td>
            <td class="text-muted small">${formatDate(r.submittedAt)}</td>
          </tr>`;
        }).join('');
      }
    } catch (e) { console.error(e); }
  </script>
</body>
</html>
