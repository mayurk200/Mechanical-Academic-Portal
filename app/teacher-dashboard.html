<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teacher Dashboard — Mechanical Academic Portal</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
  <link rel="dns-prefetch" href="https://www.gstatic.com">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body>
  <aside class="sidebar" id="sidebar"></aside>

  <div class="main-content">
    <div class="top-bar">
      <button class="btn btn-light btn-sm menu-toggle" id="menu-toggle"><i class="bi bi-list"></i></button>
      <h4><i class="bi bi-speedometer2 me-2"></i>Dashboard</h4>
      <div></div>
    </div>

    <div class="page-body">
      <!-- Stats -->
      <div class="row g-3 mb-4">
        <div class="col-md-3 col-6">
          <div class="card stat-card shadow-sm">
            <div class="card-body">
              <div class="stat-icon blue"><i class="bi bi-book"></i></div>
              <div class="stat-value" id="stat-courses">—</div>
              <div class="stat-label">Total Courses</div>
            </div>
          </div>
        </div>
        <div class="col-md-3 col-6">
          <div class="card stat-card shadow-sm">
            <div class="card-body">
              <div class="stat-icon green"><i class="bi bi-people"></i></div>
              <div class="stat-value" id="stat-students">—</div>
              <div class="stat-label">Total Students</div>
            </div>
          </div>
        </div>
        <div class="col-md-3 col-6">
          <div class="card stat-card shadow-sm">
            <div class="card-body">
              <div class="stat-icon red"><i class="bi bi-exclamation-triangle"></i></div>
              <div class="stat-value" id="stat-low-att">—</div>
              <div class="stat-label">Below 75%</div>
            </div>
          </div>
        </div>
        <div class="col-md-3 col-6">
          <div class="card stat-card shadow-sm">
            <div class="card-body">
              <div class="stat-icon purple"><i class="bi bi-pencil-square"></i></div>
              <div class="stat-value" id="stat-tests">—</div>
              <div class="stat-label">Total Tests</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Quick Actions -->
      <div class="card shadow-sm mb-4">
        <div class="card-header bg-white">
          <h6 class="mb-0"><i class="bi bi-lightning me-2"></i>Quick Actions</h6>
        </div>
        <div class="card-body d-flex flex-wrap gap-2">
          <a href="courses.html" class="btn btn-primary btn-sm"><i class="bi bi-book me-1"></i>My Courses</a>
          <a href="students.html" class="btn btn-success btn-sm"><i class="bi bi-people me-1"></i>Manage Students</a>
          <a href="attendance.html" class="btn btn-warning btn-sm"><i class="bi bi-calendar-check me-1"></i>Mark
            Attendance</a>
          <a href="test-page.html" class="btn btn-info btn-sm text-white"><i class="bi bi-pencil-square me-1"></i>Create
            Test</a>
          <a href="result-page.html" class="btn btn-outline-secondary btn-sm"><i
              class="bi bi-graph-up me-1"></i>Results</a>
        </div>
      </div>

      <!-- Attendance Overview -->
      <div class="card shadow-sm mb-4">
        <div class="card-header bg-white d-flex justify-content-between align-items-center">
          <h6 class="mb-0"><i class="bi bi-calendar-check me-2"></i>Attendance Overview</h6>
          <select id="att-course-filter" class="form-select form-select-sm" style="width:200px;">
            <option value="">— Select Course —</option>
          </select>
        </div>
        <div class="card-body p-0">
          <table class="table table-striped table-hover mb-0">
            <thead class="table-light">
              <tr>
                <th>Student</th>
                <th>Roll No</th>
                <th>URN</th>
                <th>Present</th>
                <th>Total Lectures</th>
                <th>Attendance %</th>
              </tr>
            </thead>
            <tbody id="att-overview-tbody">
              <tr>
                <td colspan="6" class="text-center text-muted py-3">Select a course</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Course Overview (full width, no Recent Activity) -->
      <div class="card shadow-sm">
        <div class="card-header bg-white">
          <h6 class="mb-0"><i class="bi bi-book me-2"></i>Course Overview</h6>
        </div>
        <div class="card-body" id="courses-list">
          <div class="text-center text-muted py-4"><span class="spinner-border spinner-border-sm"></span></div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import { initApp } from '../assets/js/core/router.js';
    import { loadTeacherStats } from '../assets/js/modules/dashboard.js';
    import { AttendanceService, EnrollmentService, UserService } from '../services/database.js';
    import { escapeHtml } from '../assets/js/core/utils.js';

    try {
      const userData = await initApp(['teacher', 'admin']);
      const stats = await loadTeacherStats(userData.uid);

      document.getElementById('stat-courses').textContent = stats.totalCourses;
      document.getElementById('stat-students').textContent = stats.totalStudents;
      document.getElementById('stat-tests').textContent = stats.totalTests;

      // Populate course filter
      const courseFilter = document.getElementById('att-course-filter');
      stats.courses.forEach(c => courseFilter.innerHTML += `<option value="${c.id}">${escapeHtml(c.title)}</option>`);

      // Count students below 75% across all courses — PARALLEL instead of sequential
      let lowAttCount = 0;
      try {
        const allPercentages = await Promise.all(
          stats.courses.map(course => AttendanceService.getCourseStudentPercentages(course.id))
        );
        allPercentages.forEach(percentages => {
          lowAttCount += percentages.filter(p => p.percentage < 75 && p.total > 0).length;
        });
      } catch (err) { console.error('Low attendance count error:', err); }
      document.getElementById('stat-low-att').textContent = lowAttCount;

      // Attendance overview — load when course selected (already deferred — no change)
      courseFilter.addEventListener('change', async () => {
        const courseId = courseFilter.value;
        const tbody = document.getElementById('att-overview-tbody');
        if (!courseId) { tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-3">Select a course</td></tr>'; return; }

        tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-3"><span class="spinner-border spinner-border-sm"></span> Loading...</td></tr>';

        try {
          const allRecords = await AttendanceService.getByCourse(courseId);
          const totalLectures = [...new Set(allRecords.map(r => r.date))].length;
          const percentages = await AttendanceService.getCourseStudentPercentages(courseId);

          // Enrich with roll no and URN — parallel
          const enriched = await Promise.all(percentages.map(async p => {
            const user = await UserService.get(p.studentId);
            return { ...p, name: user?.name || p.studentName || '—', rollNo: user?.rollNo || '—', urn: user?.urn || '—', totalLectures };
          }));

          if (enriched.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-3">No attendance data for this course</td></tr>';
            return;
          }

          tbody.innerHTML = enriched.map(s => {
            const isLow = s.percentage < 75 && s.total > 0;
            const rowStyle = isLow ? 'background-color:#ffe0e0;' : '';
            const warn = isLow ? ' <span class="badge bg-danger">Low</span>' : '';
            const cls = s.percentage >= 75 ? 'text-success' : 'text-danger';
            return `<tr style="${rowStyle}">
              <td>${escapeHtml(s.name)}</td>
              <td>${s.rollNo}</td><td>${s.urn}</td>
              <td>${s.present}</td><td>${s.totalLectures}</td>
              <td class="${cls} fw-bold">${s.percentage}%${warn}</td>
            </tr>`;
          }).join('');
        } catch (err) {
          console.error('Attendance overview error:', err);
          tbody.innerHTML = '<tr><td colspan="6" class="text-center text-danger py-3"><i class="bi bi-exclamation-triangle me-1"></i>Failed to load attendance data</td></tr>';
        }
      });

      // Course overview — PARALLEL enrichment instead of sequential
      const coursesList = document.getElementById('courses-list');
      if (stats.courses.length > 0) {
        try {
          const enriched = await Promise.all(stats.courses.map(async c => {
            const [count, attRecords] = await Promise.all([
              EnrollmentService.countByCourse(c.id),
              AttendanceService.getByCourse(c.id)
            ]);
            const lecCount = [...new Set(attRecords.map(r => r.date))].length;
            return { ...c, studentCount: count, lectureCount: lecCount };
          }));
          coursesList.innerHTML = enriched.map(c => `
            <div class="d-flex justify-content-between align-items-center p-3 border-bottom">
              <div><div class="fw-semibold">${escapeHtml(c.title)}</div><small class="text-muted">${c.code || '—'} · ${c.studentCount} students · ${c.lectureCount} lectures</small></div>
              <a href="course-detail.html?id=${c.id}" class="btn btn-outline-primary btn-sm"><i class="bi bi-eye me-1"></i>View</a>
            </div>`).join('');
        } catch (err) {
          console.error('Course overview error:', err);
          coursesList.innerHTML = '<div class="text-center text-danger py-4"><i class="bi bi-exclamation-triangle me-1"></i>Failed to load courses</div>';
        }
      } else {
        coursesList.innerHTML = '<div class="text-center text-muted py-4">No courses yet. <a href="courses.html">Create one</a></div>';
      }
    } catch (e) { console.error(e); }
  </script>
</body>

</html>
