<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Mechanical Academic Portal</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
  <link rel="dns-prefetch" href="https://www.gstatic.com">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
  <div class="auth-wrapper">
    <div class="card auth-card" style="max-width:460px;">
      <div class="card-body p-4">
        <div class="text-center mb-4">
          <img src="assets/img/logo.png" alt="ADCET" style="height:50px;object-fit:contain;">
          <h4 class="fw-bold mt-2">Mechanical Academic Portal</h4>
          <p class="text-muted small">Sign in to your account</p>
        </div>

        <!-- Login Mode Tabs -->
        <ul class="nav nav-pills nav-fill mb-3" id="loginTabs">
          <li class="nav-item">
            <button class="nav-link active" data-mode="email" id="tab-email">
              <i class="bi bi-envelope me-1"></i>Teacher / Admin
            </button>
          </li>
          <li class="nav-item">
            <button class="nav-link" data-mode="urn" id="tab-urn">
              <i class="bi bi-person-badge me-1"></i>Student (URN)
            </button>
          </li>
        </ul>

        <!-- Email Login Form (Teacher/Admin) -->
        <form id="email-login-form">
          <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" id="email" class="form-control" placeholder="Enter your email" required>
          </div>
          <div class="mb-3">
            <label for="email-password" class="form-label">Password</label>
            <input type="password" id="email-password" class="form-control" placeholder="Enter your password" required>
          </div>
          <button type="submit" class="btn btn-primary w-100 mb-3" id="email-login-btn">
            <i class="bi bi-box-arrow-in-right me-2"></i>Login
          </button>
        </form>

        <!-- URN Login Form (Student) -->
        <form id="urn-login-form" class="d-none">
          <div class="mb-3">
            <label for="urn" class="form-label">URN Number</label>
            <input type="text" id="urn" class="form-control" placeholder="Enter your URN number" required>
          </div>
          <div class="mb-3">
            <label for="urn-password" class="form-label">Password</label>
            <input type="password" id="urn-password" class="form-control" placeholder="Enter your password" required>
          </div>
          <button type="submit" class="btn btn-success w-100 mb-3" id="urn-login-btn">
            <i class="bi bi-box-arrow-in-right me-2"></i>Login with URN
          </button>
        </form>

        <!-- Forgot Password -->
        <div class="text-center" id="forgot-wrap">
          <a href="#" id="forgot-link" class="small text-muted">Forgot password?</a>
        </div>

        <form id="forgot-form" class="d-none mt-3">
          <div class="mb-3">
            <label for="reset-email" class="form-label">Email to reset password</label>
            <input type="email" id="reset-email" class="form-control" placeholder="you@example.com" required>
          </div>
          <button type="submit" class="btn btn-warning w-100">Send Reset Link</button>
          <button type="button" id="back-login" class="btn btn-link btn-sm w-100 mt-2">← Back to Login</button>
        </form>

        <hr>
        <p class="text-center mb-0 small text-muted">
          <i class="bi bi-shield-lock me-1"></i>Contact your administrator for account access
        </p>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container-custom"></div>

  <footer class="text-center py-3 mt-4 text-muted small border-top">
    System Version: <span id="version"></span>
  </footer>
  <script src="js/version.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import { loginUser, loginWithURN, resetPassword } from './assets/js/core/auth.js';
    import { showToast, friendlyError, LMSLogger } from './assets/js/core/utils.js';
    import { auth, db } from './config/firebase-config.js';
    import { signInWithEmailAndPassword, sendPasswordResetEmail, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    let isLoggingIn = false;

    // Auto-redirect if already logged in
    onAuthStateChanged(auth, async (user) => {
      if (user && !isLoggingIn) {
        try {
          const snap = await getDoc(doc(db, 'users', user.uid));
          if (snap.exists()) {
            const role = snap.data().role;
            const map = { admin: 'app/admin-dashboard.html', teacher: 'app/teacher-dashboard.html', student: 'app/student-dashboard.html' };
            window.location.href = map[role] || map.student;
          }
        } catch (e) { console.error('Auth check failed', e); }
      }
    });

    // Tab switching
    document.querySelectorAll('#loginTabs .nav-link').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('#loginTabs .nav-link').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        const mode = tab.dataset.mode;
        document.getElementById('email-login-form').classList.toggle('d-none', mode !== 'email');
        document.getElementById('urn-login-form').classList.toggle('d-none', mode !== 'urn');
      });
    });

    // Tabs logic remains


    // Forgot password toggle
    document.getElementById('forgot-link').addEventListener('click', (e) => {
      e.preventDefault();
      document.getElementById('email-login-form').classList.add('d-none');
      document.getElementById('urn-login-form').classList.add('d-none');
      document.getElementById('forgot-wrap').classList.add('d-none');
      document.getElementById('loginTabs').classList.add('d-none');
      document.getElementById('forgot-form').classList.remove('d-none');
    });
    document.getElementById('back-login').addEventListener('click', () => {
      document.getElementById('forgot-form').classList.add('d-none');
      document.getElementById('loginTabs').classList.remove('d-none');
      document.getElementById('forgot-wrap').classList.remove('d-none');
      // Show the active tab's form
      const activeMode = document.querySelector('#loginTabs .nav-link.active').dataset.mode;
      document.getElementById('email-login-form').classList.toggle('d-none', activeMode !== 'email');
      document.getElementById('urn-login-form').classList.toggle('d-none', activeMode !== 'urn');
    });

    // Email login (Teacher/Admin)
    document.getElementById('email-login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const pass = document.getElementById('email-password').value;
      const btn = document.getElementById('email-login-btn');

      isLoggingIn = true;
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Signing in...';

      try {
        const user = await loginUser(email, pass);
        showToast(`Welcome, ${user.name}!`, 'success');
        const map = { admin: 'app/admin-dashboard.html', teacher: 'app/teacher-dashboard.html', student: 'app/student-dashboard.html' };
        setTimeout(() => { window.location.href = map[user.role] || map.student; }, 600);
      } catch (err) {
        LMSLogger.auth('Email login failed', err);
        const errMsg = friendlyError(err);
        showToast(errMsg, 'error');
        
        // Remove existing alert if any
        document.getElementById('email-error-alert')?.remove();
        // Add inline alert
        btn.insertAdjacentHTML('beforebegin', `<div id="email-error-alert" class="alert alert-danger py-2 small mb-3"><i class="bi bi-exclamation-circle me-1"></i>${errMsg}</div>`);
        
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-box-arrow-in-right me-2"></i>Login';
        isLoggingIn = false;
      }
    });

    // URN login (Student)
    document.getElementById('urn-login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      isLoggingIn = true;
      const btn = document.getElementById('urn-login-btn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Signing in...';
      try {
        const user = await loginWithURN(
          document.getElementById('urn').value.trim(),
          document.getElementById('urn-password').value
        );
        showToast(`Welcome, ${user.name}!`, 'success');
        setTimeout(() => { window.location.href = 'app/student-dashboard.html'; }, 600);
      } catch (err) {
        LMSLogger.auth('URN login failed', err);
        const errMsg = friendlyError(err);
        showToast(errMsg, 'error');
        
        // Remove existing alert if any
        document.getElementById('urn-error-alert')?.remove();
        // Add inline alert
        btn.insertAdjacentHTML('beforebegin', `<div id="urn-error-alert" class="alert alert-danger py-2 small mb-3"><i class="bi bi-exclamation-circle me-1"></i>${errMsg}</div>`);
        
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-box-arrow-in-right me-2"></i>Login with URN';
        isLoggingIn = false;
      }
    });

    // Forgot password
    document.getElementById('forgot-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      try {
        await resetPassword(document.getElementById('reset-email').value.trim());
        showToast('Password reset email sent!', 'success');
        document.getElementById('back-login').click();
      } catch (err) {
        LMSLogger.auth('Password reset failed', err);
        showToast(friendlyError(err), 'error');
      }
    });
  </script>
</body>

</html>
