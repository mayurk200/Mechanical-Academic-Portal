<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mechanical Academic Portal — Learning Management System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
  <!-- Auto-redirect to login or dashboard -->
  <div class="d-flex justify-content-center align-items-center"
    style="min-height:100vh;background:linear-gradient(135deg,#667eea,#764ba2);">
    <div class="text-center text-white">
      <img src="assets/img/logo.png" alt="ADCET" style="height:60px;object-fit:contain;">
      <h3 class="mt-2">Mechanical Academic Portal</h3>
      <p class="small">Redirecting...</p>
      <div class="spinner-border spinner-border-sm text-white"></div>
    </div>
  </div>

  <script type="module">
    import { auth, db } from './config/firebase-config.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        const snap = await getDoc(doc(db, 'users', user.uid));
        if (snap.exists()) {
          const role = snap.data().role;
          const map = { admin: 'app/admin-dashboard.html', teacher: 'app/teacher-dashboard.html', student: 'app/student-dashboard.html' };
          window.location.href = map[role] || map.student;
          return;
        }
      }
      window.location.href = 'login.html';
    });
  </script>
</body>

</html>
