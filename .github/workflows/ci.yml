name: CI — Lint & Validate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate Project Structure
        run: node scripts/validateStructure.js

      - name: Check for Hardcoded Credentials
        run: |
          echo "🔍 Scanning for hardcoded Firebase API keys..."
          if grep -r "AIzaSy" --include="*.js" --include="*.html" --exclude-dir=node_modules --exclude="firebase-credentials.js" --exclude=".env.example" .; then
            echo "❌ Found hardcoded API keys! Remove them from tracked files."
            exit 1
          else
            echo "✅ No hardcoded API keys found."
          fi

      - name: Validate JSON Files
        run: |
          echo "🔍 Validating JSON files..."
          node -e "JSON.parse(require('fs').readFileSync('config/version.json', 'utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('package.json', 'utf8'))"
          echo "✅ All JSON files valid."
